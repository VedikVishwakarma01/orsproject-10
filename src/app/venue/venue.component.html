<div class="container pt-4" style="margin-top:100px; margin-bottom:100px;">

    <div class="row">

        <div class="col-md-3"></div>

        <div class="col-md-6">

            <div class="card">

                <div class="card-body">

                    <h3 class="text-center text-primary pb-3" *ngIf="!form.data.id">
                        {{'VenueForm.AddVenue' | translate}}
                    </h3>

                    <h3 class="text-center text-primary pb-3" *ngIf="form.data.id>0">
                        {{'VenueForm.UpdateVenue' | translate}}
                    </h3>


                    <!-- SUCCESS -->
                    <div *ngIf="!form.error && form.message" class="alert alert-success">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>


                    <!-- ERROR -->
                    <div *ngIf="form.error && form.message" class="alert alert-danger">
                        <button type="button" class="close" data-dismiss="alert">&times;</button>
                        {{form.message}}
                    </div>


                    <form>

                        <!-- VENUE NAME -->
                        <label>
                            <b>{{'VenueForm.VenueName' | translate}}</b>
                            <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-building"></i>
                                </div>
                            </div>

                            <input type="text" class="form-control" name="venueName" [(ngModel)]="form.data.venueName"
                                placeholder="{{'VenueForm.Placeholders.VenueName' | translate}}">

                        </div>

                        <div>
                            <span class="text-danger">
                                {{form.inputerror.venueName}}
                            </span>
                        </div>



                        <!-- CITY -->
                        <label class="mt-2">
                            <b>{{'VenueForm.City' | translate}}</b>
                            <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-map-marker"></i>
                                </div>
                            </div>

                            <input type="text" class="form-control" name="city" [(ngModel)]="form.data.city"
                                placeholder="{{'VenueForm.Placeholders.City' | translate}}">

                        </div>

                        <div>
                            <span class="text-danger">
                                {{form.inputerror.city}}
                            </span>
                        </div>



                        <!-- RATING -->
                        <label class="mt-2">
                            <b>{{'VenueForm.Rating' | translate}}</b>
                            <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-2">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-star"></i>
                                </div>
                            </div>

                            <select class="form-control" name="rating" [(ngModel)]="form.data.rating">

                                <option value="">
                                    {{'VenueForm.SelectOptions.SelectRating' | translate}}
                                </option>

                                <option *ngFor="let r of form.preload.ratingList" [value]="r">
                                    {{r}}
                                </option>

                            </select>

                        </div>

                        <div>
                            <span class="text-danger">
                                {{form.inputerror.rating}}
                            </span>
                        </div>



                        <!-- CAPACITY -->
                        <label class="mt-2">
                            <b>{{'VenueForm.Capacity' | translate}}</b>
                            <span style="color:red">*</span>
                        </label>

                        <div class="input-group mb-3">

                            <div class="input-group-prepend">
                                <div class="input-group-text">
                                    <i class="fa fa-users"></i>
                                </div>
                            </div>

                            <input type="number" class="form-control" name="capacity" [(ngModel)]="form.data.capacity"
                                placeholder="{{'VenueForm.Placeholders.Capacity' | translate}}">

                        </div>

                        <div>
                            <span class="text-danger">
                                {{form.inputerror.capacity}}
                            </span>
                        </div>



                        <!-- BUTTONS -->
                        <div class="text-center mt-3">

                            <button *ngIf="!form.data.id" type="button" class="btn btn-success" (click)="submit()">
                                {{'Buttons.Save' | translate}}
                            </button>

                            &nbsp;

                            <button *ngIf="!form.data.id" type="button" class="btn btn-warning btn-md"
                                (click)="reset()">
                                {{'Buttons.Reset' | translate}}
                            </button>


                            <button *ngIf="form.data.id > 0" type="button" class="btn btn-primary" (click)="submit()">
                                {{'Buttons.Update' | translate}}
                            </button>

                            &nbsp;

                            <button *ngIf="form.data.id > 0" type="button" class="btn btn-info"
                                (click)="forward('/venuelist')">
                                {{'Buttons.List' | translate}}
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

        <div class="col-md-3"></div>

    </div>

</div>
